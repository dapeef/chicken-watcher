services:
  hardware-agent:
    build: .
    entrypoint: []
    command: ["uv", "run", "manage.py", "run_hardware_agent"]
#    privileged: true
#    devices:
#      - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      - DJANGO_ENV=prod
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: unless-stopped
    depends_on:
      - db

  web-app:
    build: .
    environment:
      - DJANGO_ENV=prod
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      - db
    ports:
      - "8000:8000"

  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
#    healthcheck:
#      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
#      interval: 5s
#      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  pgdata:
