services:
  hardware-agent:
    build:
      context: .
      target: runtime
    command: ["python", "manage.py", "run_hardware_agent"]
    privileged: true
    environment:
      - DJANGO_ENV=prod
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MEDIA_ROOT=/app/media
      - LOG_FILENAME=hardware_agent.log
      - RFID_RESET_LINE=${RFID_RESET_LINE:-dtr}
      - RFID_PORT_LEFT_1=${RFID_PORT_LEFT_1}
      - RFID_PORT_LEFT_2=${RFID_PORT_LEFT_2}
      - RFID_PORT_LEFT_3=${RFID_PORT_LEFT_3}
      - RFID_PORT_LEFT_4=${RFID_PORT_LEFT_4}
      - RFID_PORT_RIGHT_1=${RFID_PORT_RIGHT_1}
      - RFID_PORT_RIGHT_2=${RFID_PORT_RIGHT_2}
      - RFID_PORT_RIGHT_3=${RFID_PORT_RIGHT_3}
      - RFID_PORT_RIGHT_4=${RFID_PORT_RIGHT_4}
      - CAMERA_DEVICE=${CAMERA_DEVICE}
      - BEAM_BREAK_GPIO_LEFT=${BEAM_BREAK_GPIO_LEFT}
      - BEAM_BREAK_GPIO_RIGHT=${BEAM_BREAK_GPIO_RIGHT}
    volumes:
      - media_volume:/app/media
      - logs_volume:/app/logs
      - /dev:/dev
    restart: unless-stopped
    depends_on:
      web-app:
        condition: service_healthy

  web-app:
    build:
      context: .
      target: runtime
    environment:
      - DJANGO_ENV=prod
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MEDIA_ROOT=/app/media
      - STATIC_ROOT=/app/static
      - LOG_FILENAME=web_app.log
      - COOP_LATITUDE=${COOP_LATITUDE}
      - COOP_LONGITUDE=${COOP_LONGITUDE}
    volumes:
      - media_volume:/app/media
      - static_volume:/app/static
      - logs_volume:/app/logs
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\", 8000)); s.close()'" ]
      interval: 10s
      retries: 10
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: .
      target: scheduler
    environment:
      - DJANGO_ENV=prod
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MEDIA_ROOT=/app/media
      - LOG_FILENAME=scheduler.log
    volumes:
      - media_volume:/app/media
      - logs_volume:/app/logs
    restart: unless-stopped
    depends_on:
      web-app:
        condition: service_healthy

  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped

volumes:
  media_volume:
  static_volume:
  logs_volume:
  pgdata:
