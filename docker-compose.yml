services:
  hardware-agent:
    build: .
    command: ["uv", "run", "manage.py", "run_hardware_agent"]
#    privileged: true
#    devices:
#      - "${RFID_SERIAL_PORT_LEFT}:${RFID_SERIAL_PORT_LEFT}"
#      - "${RFID_SERIAL_PORT_RIGHT}:${RFID_SERIAL_PORT_RIGHT}"
#      - "${CAMERA_DEVICE}:${CAMERA_DEVICE}"
    environment:
      - DJANGO_ENV=prod
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MEDIA_ROOT=/app/media
      - RFID_SERIAL_PORT_LEFT=${RFID_SERIAL_PORT_LEFT}
      - RFID_SERIAL_PORT_RIGHT=${RFID_SERIAL_PORT_RIGHT}
      - CAMERA_DEVICE=${CAMERA_DEVICE}
    volumes:
      - media_volume:/app/media
    restart: unless-stopped
    depends_on:
      - db

  web-app:
    build: .
    environment:
      - DJANGO_ENV=prod
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MEDIA_ROOT=/app/media
      - STATIC_ROOT=/app/static
    volumes:
      - media_volume:/app/media
      - static_volume:/app/static
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
#    healthcheck:
#      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
#      interval: 5s
#      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped

volumes:
  media_volume:
  static_volume:
  pgdata:
