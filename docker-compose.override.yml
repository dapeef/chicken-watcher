services:
  hardware-agent:
    develop:
      watch:
        - action: rebuild
          path: ./src
          target: /app/src
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
            - "**/*.egg-info"
        - action: rebuild
          path: ./hardware-agent/pyproject.toml
        - action: rebuild
          path: ./hardware-agent/uv.lock

  web-app:
    develop:
      watch:
        - action: rebuild
          path: ./src
          target: /app/src
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
            - "**/*.egg-info"
        - action: rebuild
          path: ./hardware-agent/pyproject.toml
        - action: rebuild
          path: ./hardware-agent/uv.lock

  db:
    ports:
      - "5432:5432"
