<div class="mb-3">
  {% if field.field.widget.input_type == "radio" %}
    <label class="form-label" id="{{ field.id_for_label }}_group">
      {{ field.label }}{% if optional %} <span class="text-muted fw-normal">(optional)</span>{% endif %}
    </label>
    <div class="d-flex gap-2 flex-wrap" role="radiogroup" aria-labelledby="{{ field.id_for_label }}_group">
      {% for sub in field %}
        <div class="form-check form-check-inline m-0">
          {{ sub.tag }}
          <label class="form-check-label" for="{{ sub.id_for_label }}">{{ sub.choice_label }}</label>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <label for="{{ field.id_for_label }}" class="form-label">
      {{ field.label }}{% if optional %} <span class="text-muted fw-normal">(optional)</span>{% endif %}
    </label>
    {{ field }}
  {% endif %}

  {% if field.help_text %}
    <div class="form-text">{{ field.help_text }}</div>
  {% endif %}
  {% if field.errors %}
    <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
  {% endif %}
</div>
