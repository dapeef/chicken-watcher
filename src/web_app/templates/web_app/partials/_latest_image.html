<div class="card shadow-sm overflow-hidden" id="latest-image-card">
  <div class="card-header">
    <h6 class="mb-0 fw-semibold">Latest nesting box image</h6>
  </div>
  {% if latest_image %}
    <img id="dashboard-image" src="{{ latest_image.image.url }}" class="w-100" alt="Latest nesting box activity">
  {% else %}
    <img id="dashboard-image" src="" class="w-100 d-none" alt="Latest nesting box activity">
  {% endif %}
  <div class="card-body">
    <p id="image-timestamp" class="text-muted mb-0 small">
      {% if latest_image %}Captured {{ latest_image.created_at|timesince }} ago{% else %}No images available yet.{% endif %}
    </p>
  </div>
</div>
