<th scope="col"
    {% if direction %}aria-sort="{{ direction }}"{% endif %}
    class="fw-semibold{% if not direction %} text-muted{% endif %}{% if not mobile %} d-none d-md-table-cell{% endif %}">
  <a class="text-decoration-none {% if direction %}text-body{% else %}text-muted{% endif %}"
     href="{{ next_href }}"
     {% if direction == 'ascending' %}aria-label="{{ label }}, currently sorted ascending. Activate to sort descending."
     {% elif direction == 'descending' %}aria-label="{{ label }}, currently sorted descending. Activate to sort ascending."
     {% else %}aria-label="Sort by {{ label }}"{% endif %}>
    {{ label }}{% if arrow %} <span aria-hidden="true">{{ arrow }}</span>{% endif %}
  </a>
</th>
