{% extends "web_app/base.html" %}
{% block title %}Egg Production | Coop{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<h1 class="mb-4">Egg Production</h1>

<form class="row gy-2 gx-3 align-items-end mb-3">
  <div class="col-auto">
    <label class="form-label mb-0" for="id_start">Start</label>
    <input type="date" class="form-control" id="id_start" name="start"
           value="{{ start }}">
  </div>
  <div class="col-auto">
    <label class="form-label mb-0" for="id_end">End</label>
    <input type="date" class="form-control" id="id_end" name="end"
           value="{{ end }}">
  </div>
  <div class="col-auto">
    <label class="form-label mb-0" for="id_w">Rolling window</label>
    <select class="form-select" id="id_w" name="w">
      {% for n in window_choices %}
        <option value="{{ n }}" {% if n == window %}selected{% endif %}>{{ n }} days</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <button class="btn btn-primary">Update</button>
  </div>
</form>

<canvas id="eggProdChart" height="160"></canvas>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const ctx = document.getElementById("eggProdChart");
  if (!ctx) return;

  const labels   = {{ labels_json|safe }};
  const datasets = {{ datasets_json|safe }};

  new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      scales: {
        y: { beginAtZero: true, title: { display:true, text:"eggs / hen / day" } },
        x: { ticks: { maxTicksLimit: 15 } }
      },
      plugins: {
        legend: { position: "bottom" },
        tooltip: { intersect: false }
      }
    }
  });
});
</script>
{% endblock %}
