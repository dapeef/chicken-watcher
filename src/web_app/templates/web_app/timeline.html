{% extends "base.html" %}

{% block title %}Timeline - Coop{% endblock %}

{% block extra_head %}
<script type="text/javascript" src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
<link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" type="text/css" />

<style>
    #visualization {
        width: 100%;
        height: 400px;
        border: 1px solid lightgray;
    }
    #camera-preview {
        min-height: 500px;
    }
    .timeline-egg {
        background-color: #fff3cd;
        border-color: #ffeeba;
    }
    .timeline-period.box-left {
        background-color: #d1ecf1;
        border-color: #bee5eb;
    }
    .timeline-period.box-right {
        background-color: #d4edda;
        border-color: #c3e6cb;
    }
    .timeline-presence-dot.vis-point {
        background: none;
        border: none;
    }
    .timeline-presence-dot.box-left .vis-dot {
        border-width: 3px;
        border-radius: 3px;
        border-color: #0d6efd;
    }
    .timeline-presence-dot.box-right .vis-dot {
        border-width: 3px;
        border-radius: 3px;
        border-color: #198754;
    }
    .timeline-presence-dot .vis-item-content {
        padding: 0;
    }
    .vis-custom-time.preview-line {
        background-color: #0d6efd;
        width: 3px;
        pointer-events: none;
        z-index: 10;
    }
</style>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1>Event Timeline</h1>
        <p class="text-muted">Hover over the timeline to see camera footage from that time.</p>
        <div id="visualization"></div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-12" id="camera-preview">
        <div class="card shadow-sm overflow-hidden" id="latest-image-card">
            <img id="dashboard-image" src="" class="w-100 d-none" alt="Camera preview">
            <div class="card-body">
                <h5 class="card-title">Camera Preview</h5>
                <p id="image-timestamp" class="text-muted mb-0 small">Hover over timeline to see camera footage</p>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    const container = document.getElementById('visualization');
    const items = new vis.DataSet([]);
    const groups = new vis.DataSet([
        {% for chicken in chickens %}
        { id: 'chicken_{{ chicken.id }}', content: '{{ chicken.name }}', stack: false },
        {% endfor %}
        { id: 'unknown', content: 'Unknown', stack: true }
    ]);

    const options = {
        height: '400px',
        stack: true,
        showCurrentTime: true,
        zoomMin: 1000 * 60, // 1 minute
    };

    const timeline = new vis.Timeline(container, items, groups, options);

    // Default range: today 00:00 to 00:00 tomorrow
    const startOfDay = new Date();
    startOfDay.setHours(0, 0, 0, 0);
    const endOfDay = new Date();
    endOfDay.setDate(endOfDay.getDate() + 1);
    endOfDay.setHours(0, 0, 0, 0);
    timeline.setWindow(startOfDay, endOfDay);

    function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    }

    let cachedImages = [];
    let objectUrls = [];
    let currentAbortController = null;
    let lastMouseTime = null;

    const loadImages = function(properties, signal) {
        const start = properties.start.toISOString();
        const end = properties.end.toISOString();
        const url = `{% url 'timeline_images' %}?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}&n=100`;
        
        fetch(url, { signal })
            .then(response => response.json())
            .then(data => {
                if (signal.aborted) return;

                // Clean up old object URLs that aren't currently displayed
                const imgElement = document.getElementById('dashboard-image');
                const currentSrc = imgElement ? imgElement.src : '';
                
                objectUrls.forEach(u => {
                    if (u !== currentSrc) {
                        URL.revokeObjectURL(u);
                    }
                });
                objectUrls = objectUrls.filter(u => u === currentSrc);

                cachedImages = data.map(img => ({
                    timestamp: new Date(img.timestamp).getTime(),
                    url: img.url,
                    iso: img.timestamp,
                    blobUrl: null
                }));

                // Refresh preview if mouse is already over timeline
                if (lastMouseTime) {
                    updatePreview(lastMouseTime);
                }

                // Prioritize loading images closest to the  ouse (or center of view)
                const startMs = properties.start.getTime();
                const endMs = properties.end.getTime();
                const centerMs = (startMs + endMs) / 2;
                const referenceTime = lastMouseTime ? lastMouseTime.getTime() : centerMs;

                const sortedForLoading = [...cachedImages].sort((a, b) => {
                    return Math.abs(a.timestamp - referenceTime) - Math.abs(b.timestamp - referenceTime);
                });

                // Preload images as blobs to ensure NO network requests during scrubbing
                sortedForLoading.forEach(img => {
                    fetch(img.url, { signal })
                        .then(res => res.blob())
                        .then(blob => {
                            if (signal.aborted) return;
                            const bUrl = URL.createObjectURL(blob);
                            img.blobUrl = bUrl;
                            objectUrls.push(bUrl);
                            // Refresh preview as blobs arrive
                            if (lastMouseTime) {
                                updatePreview(lastMouseTime);
                            }
                        })
                        .catch(err => {
                            if (err.name === 'AbortError') return;
                            console.error("Error preloading blob:", err);
                        });
                });
            })
            .catch(err => {
                if (err.name === 'AbortError') return;
                console.error("Error loading image metadata:", err);
            });
    };

    const loadData = debounce(function(properties) {
        if (currentAbortController) {
            currentAbortController.abort();
        }
        currentAbortController = new AbortController();
        const signal = currentAbortController.signal;

        const start = properties.start.toISOString();
        const end = properties.end.toISOString();

        // Check zoom level and remove dots if too far out
        const durationMs = properties.end.getTime() - properties.start.getTime();
        const threeMinsMs = 3 * 60 * 1000;
        if (durationMs > threeMinsMs) {
            const dots = items.get({
                filter: function (item) {
                    return item.className && item.className.includes('timeline-presence-dot');
                }
            });
            if (dots.length > 0) {
                items.remove(dots);
            }
        }

        const url = `{% url 'timeline_data' %}?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
        
        fetch(url, { signal })
            .then(response => response.json())
            .then(data => {
                if (signal.aborted) return;
                // Use update to avoid duplicates and only add new items
                items.update(data);
            })
            .catch(err => {
                if (err.name === 'AbortError') return;
                console.error("Error loading timeline data:", err);
            });
        
        loadImages(properties, signal);
    }, 300);

    timeline.on('rangechanged', loadData);
    
    // Initial load
    loadData({
        start: startOfDay,
        end: endOfDay
    });

    const updatePreview = function(time) {
        if (!cachedImages.length) return;
        
        const targetTime = time.getTime();
        
        let closest = null;
        let minDiff = Infinity;

        // 1. Try to find the closest LOADED image
        for (let i = 0; i < cachedImages.length; i++) {
            if (cachedImages[i].blobUrl) {
                const diff = Math.abs(targetTime - cachedImages[i].timestamp);
                if (diff < minDiff) {
                    minDiff = diff;
                    closest = cachedImages[i];
                }
            }
        }

        // 2. Fallback to absolute closest among ALL images if none are loaded yet
        if (!closest) {
            closest = cachedImages[0];
            minDiff = Math.abs(targetTime - closest.timestamp);
            for (let i = 1; i < cachedImages.length; i++) {
                const diff = Math.abs(targetTime - cachedImages[i].timestamp);
                if (diff < minDiff) {
                    minDiff = diff;
                    closest = cachedImages[i];
                }
            }
        }
        
        const imgElement = document.getElementById('dashboard-image');
        const timestampElement = document.getElementById('image-timestamp');
        
        if (imgElement && closest) {
            const displayUrl = closest.blobUrl || closest.url;
            // Only update src if it's actually different
            // Check both exact match (for blob URLs) and endsWith (for relative paths)
            if (imgElement.src !== displayUrl && !imgElement.src.endsWith(displayUrl)) {
                imgElement.src = displayUrl;
                imgElement.classList.remove('d-none');
            }
            if (timestampElement) {
                const date = new Date(closest.iso);
                timestampElement.innerText = `Photo from ${date.toLocaleString()}`;
            }

            // Move the preview line to the exact timestamp of the image
            const imageDate = new Date(closest.timestamp);
            if (!previewLineAdded) {
                timeline.addCustomTime(imageDate, 'preview-line');
                previewLineAdded = true;
            } else {
                timeline.setCustomTime(imageDate, 'preview-line');
            }
        }
    };

    // Use the vis-timeline mouseMove event for better stability
    let previewLineAdded = false;
    timeline.on('mouseMove', function (props) {
        if (props.time) {
            lastMouseTime = props.time;
            updatePreview(props.time);
        }
    });
</script>
{% endblock %}
