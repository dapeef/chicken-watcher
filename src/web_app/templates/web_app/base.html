<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Coop{% endblock %}</title>

    <!-- Bootstrap -->
    <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
           rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'dashboard' %}">🐔 Coop</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Today</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'chicken_list' %}">Chickens</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'box_list' %}">Nesting Boxes</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'egg_analytics' %}">Analytics</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
    {% block content %}{% endblock %}
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</html>
